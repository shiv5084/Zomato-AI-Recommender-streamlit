services:
  - type: web
    name: zomato-ai-backend
    env: python
    region: oregon # Or your preferred Render region
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.phase6.api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8 # Make sure this matches your project's Python version
      - key: GROQ_API_KEY
        sync: false # Set this securely in the Render Dashboard
      - key: CORS_ORIGINS
        sync: false # Set to Vercel origin URLs (comma-separated)
